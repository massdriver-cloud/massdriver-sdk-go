version: "2"

run:
  timeout: 3m
  # Analyze test files too — but with relaxed rules for tests below.
  tests: true
  # Build tags so integration test files are also analyzed.
  build-tags:
    - integration

linters:
  default: standard
  enable:
    # Default set is { errcheck, govet, ineffassign, staticcheck, unused }.
    # Add a small, opinionated set of higher-signal linters on top.
    - bodyclose # detects HTTP response bodies that are never closed
    - contextcheck # context.Context is propagated correctly
    - copyloopvar # post-Go-1.22 loopvar semantics; flags accidental shared captures
    - cyclop # cyclomatic complexity (with tuned threshold below)
    - dupl # large duplicated blocks (suppressed for the Iter pattern)
    - errname # error variables named ErrFoo and types named FooError
    - errorlint # checks for the wrong way to wrap errors
    - exhaustive # exhaustive switch on enum-like types
    - gosec # security checks
    - misspell # spelling
    - revive # successor to golint; doc comments, naming, etc.
    - testifylint # idiomatic testify usage
    - testpackage # use of `package foo_test` for external tests
    - unconvert # redundant type conversions
    - unparam # unused function parameters
    - whitespace # leading/trailing whitespace inside blocks

  settings:
    cyclop:
      # Default 10 is too tight for this codebase's pagination loops
      # and exhaustive case analysis. 20 keeps real complexity flagged
      # without nagging on legitimate breadth.
      max-complexity: 20

    errcheck:
      # Don't require error checks for these stdlib helpers — overhead
      # without value.
      exclude-functions:
        - io.WriteString
        - (*net/http.Request).Write
        - (io.Closer).Close
        - (net.Conn).Close

    revive:
      # High-signal rules only. The doc-comment-on-every-export rule
      # ("exported", "package-comments") is great in principle but
      # noisy on enum-style const blocks where the type carries the
      # docs and the values are self-describing. Skipping until we
      # find we want it back.
      rules:
        - name: var-naming
        - name: unused-parameter
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: error-return
        - name: error-naming
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: errorf
        - name: dot-imports
        - name: blank-imports

    gosec:
      excludes:
        - G304 # Variable file paths — fine for ~/.config-style lookups.
        - G115 # int overflow conversions — almost always false positive in tests.

  exclusions:
    # Default presets handle obvious noise (vendored code, generated
    # files, etc.) plus we add per-path overrides below.
    presets:
      - common-false-positives
      - legacy
      - std-error-handling

    rules:
      # Tests get relaxed treatment: complexity is fine (table tests
      # are inherently branchy), repeated literals are fine, doc
      # comments aren't required.
      - path: _test\.go
        linters:
          - cyclop
          - dupl
          - errcheck
          - errorlint
          - funlen
          - gocognit
          - gosec
          - goconst
          - revive
          - testpackage
          - unparam

      # Compile-time type assertions in tests like
      # `var _ *types.Foo = got.Field` are intentional — the
      # explicit type is the point. staticcheck's QF1011 wants the
      # type omitted, which would defeat the assertion.
      - path: _test\.go
        text: "QF1011"
        linters:
          - staticcheck

      # Internal packages aren't part of the public API; doc comments
      # on every exported symbol there are nice but not required.
      - path: massdriver/internal/
        linters:
          - revive

      # Legacy serde alias on the env-config struct kept for
      # backward compat with existing user setups.
      - text: "var-naming: struct field OrgId should be OrgID"
        linters:
          - revive

      # The types package name is intentional — it's the canonical
      # home for all platform types and short imports read better
      # (`types.Project`, `types.Resource`).
      - path: massdriver/platform/types/
        text: "avoid meaningless package names"
        linters:
          - revive

      # Generated genqlient code: don't lint at all.
      - path: massdriver/internal/gen/zz_generated\.go
        linters:
          - all

      # The auditlogs.Iter and instances.IterAlarms helpers are
      # near-clones of their package's List loop by design — same
      # logic, different shape.
      - path: massdriver/platform/.+/(auditlogs|instances|alarms)\.go
        linters:
          - dupl

      # Absinthe socket dispatch is a switch on Phoenix frame events;
      # the breadth is the point of the function.
      - path: massdriver/internal/absinthe/socket\.go
        text: "function dispatch"
        linters:
          - cyclop

      # TailLogs orchestrates backfill + subscription + drain; its
      # complexity is essential, not accidental. Refactor would make
      # the flow harder to follow.
      - path: massdriver/platform/deployments/stream\.go
        text: "function TailLogs"
        linters:
          - cyclop

      # provisioning/* is the REST surface called by xo (baked into
      # provisioner containers) and by the Terraform provider —
      # it's a separate audience from the GraphQL platform packages
      # and gets relaxed lint treatment to match its history.
      - path: massdriver/provisioning/
        linters:
          - revive
          - errorlint
          - testifylint

      # MutationFailed is the user-facing error type for failed
      # mutations; renaming to MutationFailedError reads worse and
      # would be a breaking-change in the public API.
      - path: massdriver/gql/errors\.go
        text: "error type name `MutationFailed`"
        linters:
          - errname

      # absinthe.Subscription.Close uses its own short timeout
      # internally (it's invoked from a goroutine watching ctx.Done).
      # Threading the parent ctx would deadlock during cancellation.
      - path: massdriver/platform/deployments/stream\.go
        text: "should pass the context parameter"
        linters:
          - contextcheck
