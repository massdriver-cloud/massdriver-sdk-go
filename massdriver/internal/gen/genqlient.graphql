# Massdriver platform GraphQL operations.
#
# Source for genqlient codegen — every query, mutation, and subscription
# the SDK issues lives here. Sections are alphabetical by SDK domain
# (access tokens, bundles, deployments, ...). Sub-domains (e.g. instance
# alarms) are nested under their parent.

# ACCESS TOKENS

# @genqlient(for: "AccessTokensFilter.revoked", omitempty: true, pointer: true)
query ListAccessTokens(
  $organizationId: ID!,
  # @genqlient(omitempty: true, pointer: true)
  $filter: AccessTokensFilter,
  # @genqlient(omitempty: true, pointer: true)
  $sort: AccessTokensSort,
  # @genqlient(omitempty: true, pointer: true)
  $cursor: Cursor
) {
  accessTokens(organizationId: $organizationId, filter: $filter, sort: $sort, cursor: $cursor) {
    cursor {
      next
      previous
    }
    items {
      id
      name
      prefix
      scopes
      expiresAt
      revokedAt
      lastUsedAt
      createdAt
    }
  }
}

# @genqlient(for: "CreateAccessTokenInput.expiresInMinutes", omitempty: true, pointer: true)
mutation CreateAccessToken(
  $organizationId: ID!,
  $input: CreateAccessTokenInput!
) {
  createAccessToken(organizationId: $organizationId, input: $input) {
    result {
      id
      name
      token
      prefix
      scopes
      expiresAt
      createdAt
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation RevokeAccessToken($organizationId: ID!, $id: UUID!) {
  revokeAccessToken(organizationId: $organizationId, id: $id) {
    result {
      id
      name
      prefix
      revokedAt
    }
    successful
    messages {
      code
      field
      message
    }
  }
}


