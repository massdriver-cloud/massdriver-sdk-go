# @genqlient(for: "UpdateInstanceAlarmInput.period", omitempty: true, pointer: true)
# @genqlient(for: "UpdateInstanceAlarmInput.metric", omitempty: true, pointer: true)
mutation UpdateInstanceAlarm(
  $organizationId: ID!,
  $id: UUID!,
  $input: UpdateInstanceAlarmInput!
) {
  updateInstanceAlarm(
    organizationId: $organizationId,
    id: $id,
    input: $input
  ) {
    result {
      id
      displayName
      cloudResourceId
      comparisonOperator
      threshold
      period
      # @genqlient(pointer: true)
      metric {
        namespace
        name
        statistic
        region
        dimensions {
          name
          value
        }
      }
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

