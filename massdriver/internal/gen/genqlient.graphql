    status
    version
    releaseStrategy
    resolvedVersion
    deployedVersion
    availableUpgrade
    params
    attributes
    createdAt
    updatedAt
    cost {
      lastMonth { amount currency }
      monthlyAverage { amount currency }
      lastDay { amount currency }
      dailyAverage { amount currency }
    }
    statePaths {
      stepName
      stateUrl
    }
    environment {
      id
      name
      description
      attributes
      createdAt
      updatedAt
      project {
        id
        name
        description
      }
    }
    bundle {
      id
      name
      version
      description
      icon
      sourceUrl
      repo
      createdAt
      updatedAt
    }
    component {
      id
      name
      description
      attributes
      createdAt
      updatedAt
    }
    resources {
      resource {
        id
        name
        origin
        field
        attributes
        payload
        createdAt
        updatedAt
        # @genqlient(pointer: true)
        resourceType {
          id
          name
        }
      }
    }
  }
}

